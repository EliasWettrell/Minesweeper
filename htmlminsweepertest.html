<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minesweeper</title>

  <!-- CSS !-->
  <link rel="stylesheet" href="cssminesweepertest.css">
  
</head>
<body>

<div type="hidden" style=" position: fixed; opacity: 0%; display: flex; align-items: center; justify-content: center; background-image: url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-1.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-2.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-3.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-4.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-5.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-6.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-7.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-8.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-flag.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-mine.png?raw=true'), url('https://github.com/EliasWettrell/Minesweeper/blob/Minesweeper/tile-explored.png?raw=true');"> </div>

  <div class="wrapper">
    <div id="board" class="board"></div>
  </div>
 
  <div id="lose-screen" class="overlay hidden">
    <div class="lose-box">
      <h2>💣 Game Over</h2>
      <div class="buttons">
        <button id="restart-btn">Restart</button>
        <button id="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>
  
  <!-- JS -->
  <script src="jsminesweepertest.js"></script>
</body>
</html>
